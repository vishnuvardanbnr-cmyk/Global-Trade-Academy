kind = "web"
previewPath = "/"
title = "Bright Insight"
version = "1.0.0"
id = "artifacts/edu"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23624

[services.development]
run = "pnpm --filter @workspace/edu run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/edu", "run", "build" ]
publicDir = "artifacts/edu/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23624"
BASE_PATH = "/"
