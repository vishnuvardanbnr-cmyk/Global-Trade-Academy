      responses:
        "200":
          description: Certificates list
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Certificate" }

  /certificates/{serial}:
    get:
      operationId: getCertificate
      tags: [certificates]
      summary: Verify a certificate by serial (public)
      parameters:
        - { name: serial, in: path, required: true, schema: { type: string } }
      responses:
        "200":
          description: Certificate
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Certificate" }

  # ── LMS: REVIEWS ─────────────────────────────────────────────────
  /courses/{courseId}/reviews:
    get:
      operationId: listReviews
