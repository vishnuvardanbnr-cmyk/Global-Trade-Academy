      parameters:
        - { name: taskId, in: path, required: true, schema: { type: integer } }
      requestBody:
        required: false
        content:
          application/json:
            schema: { $ref: "#/components/schemas/TaskCompleteInput" }
      responses:
        "200":
          description: Completion
          content:
            application/json:
              schema: { $ref: "#/components/schemas/TaskCompletion" }

  # ── LMS: CERTIFICATES ────────────────────────────────────────────
  /certificates:
    get:
      operationId: listCertificates
      tags: [certificates]
