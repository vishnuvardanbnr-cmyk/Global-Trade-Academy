        "200":
          description: Reviews summary
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ReviewSummary" }
    post:
      operationId: upsertReview
      tags: [reviews]
      summary: Create or update the current user review (enrolled only)
      parameters:
        - { name: courseId, in: path, required: true, schema: { type: integer } }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ReviewInput" }
      responses:
        "200":
          description: Saved review
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Review" }

  # ── LMS: NOTES ───────────────────────────────────────────────────
  /lessons/{lessonId}/notes:
    get:
      operationId: listNotes
      tags: [notes]
      summary: List current user notes for a lesson
      parameters:
        - { name: lessonId, in: path, required: true, schema: { type: integer } }
      responses:
        "200":
          description: Notes list
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Note" }
    post:
      operationId: createNote
      tags: [notes]
      summary: Create a note on a lesson
      parameters:
        - { name: lessonId, in: path, required: true, schema: { type: integer } }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/NoteInput" }
      responses:
        "201":
          description: Created note
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Note" }

  /notes/{noteId}:
    patch:
      operationId: updateNote
      tags: [notes]
      summary: Update a note
      parameters:
        - { name: noteId, in: path, required: true, schema: { type: integer } }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/NoteUpdate" }
      responses:
        "200":
          description: Updated note
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Note" }
    delete:
      operationId: deleteNote
      tags: [notes]
      summary: Delete a note
      parameters:
        - { name: noteId, in: path, required: true, schema: { type: integer } }
      responses:
        "204": { description: Deleted }

  # ── LMS: BOOKMARKS ───────────────────────────────────────────────
  /courses/{courseId}/bookmarks:
    get:
      operationId: listBookmarks
      tags: [bookmarks]
      summary: List current user bookmarks for a course
      parameters:
        - { name: courseId, in: path, required: true, schema: { type: integer } }
      responses:
        "200":
          description: Bookmarks list
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Bookmark" }

  /lessons/{lessonId}/bookmark:
    post:
      operationId: toggleBookmark
      tags: [bookmarks]
      summary: Toggle a bookmark on a lesson
      parameters:
        - { name: lessonId, in: path, required: true, schema: { type: integer } }
      responses:
        "200":
          description: Toggle result
          content:
            application/json:
              schema: { $ref: "#/components/schemas/BookmarkToggleResult" }

  # ── LMS: PREREQUISITES ───────────────────────────────────────────
  /courses/{courseId}/prerequisites:
    get:
      operationId: listPrerequisites
      tags: [courses]
      summary: List prerequisites for a course (with met state)
      parameters:
        - { name: courseId, in: path, required: true, schema: { type: integer } }
      responses:
        "200":
          description: Prerequisites
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/PrerequisiteCourse" }

  # ── LMS: INSTRUCTOR ANALYTICS ────────────────────────────────────
  /courses/{courseId}/analytics:
    get:
      operationId: getCourseAnalytics
      tags: [courses]
      summary: Get analytics for a course (instructor)
      parameters:
        - { name: courseId, in: path, required: true, schema: { type: integer } }
      responses:
        "200":
          description: Course analytics
          content:
            application/json:
              schema: { $ref: "#/components/schemas/CourseAnalytics" }

  # ── LMS: LESSON GATES ────────────────────────────────────────────
  /lessons/{lessonId}/gate:
    get:
      operationId: getLessonGate
      tags: [lessonGates]
      summary: Get the approval gate state for a lesson (current user)
      parameters:
        - { name: lessonId, in: path, required: true, schema: { type: integer } }
      responses:
        "200":
          description: Gate state (null body if no gate exists yet)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/LessonGate" }

  /instructor/gates/analytics:
    get:
      operationId: getGateAnalytics
      tags: [lessonGates]
      summary: Get per-lesson quiz gate analytics (instructor)
      parameters:
        - { name: courseId, in: query, schema: { type: integer } }
      responses:
        "200":
          description: Per-lesson gate analytics
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/LessonGateAnalytics" }

  /instructor/reviews:
    get:
      operationId: listInstructorReviews
      tags: [lessonGates]
      summary: List pending and recent gate reviews (instructor)
      parameters:
        - { name: status, in: query, schema: { type: string } }
        - { name: courseId, in: query, schema: { type: integer } }
      responses:
        "200":
          description: Gate review items
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/GateReviewItem" }

  /instructor/reviews/count:
    get:
      operationId: getInstructorReviewCount
      tags: [lessonGates]
      summary: Get count of pending gate reviews (instructor)
      responses:
        "200":
          description: Pending count
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ReviewCount" }

  /instructor/reviews/{gateId}/approve:
    post:
      operationId: approveGate
      tags: [lessonGates]
      summary: Approve a student lesson gate (instructor)
      parameters:
        - { name: gateId, in: path, required: true, schema: { type: integer } }
      responses:
        "200":
          description: Updated gate
          content:
            application/json:
              schema: { $ref: "#/components/schemas/LessonGate" }

  /instructor/reviews/{gateId}/reject:
    post:
      operationId: rejectGate
      tags: [lessonGates]
      summary: Reject a gate and assign a new quiz (instructor)
      parameters:
        - { name: gateId, in: path, required: true, schema: { type: integer } }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/GateRejectInput" }
      responses:
        "200":
          description: Updated gate
          content:
            application/json:
              schema: { $ref: "#/components/schemas/LessonGate" }

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    UserProfile:
      type: object
      required: [id, clerkId, email, role]
      properties:
        id: { type: string }
        clerkId: { type: string }
        email: { type: string }
        displayName: { type: ["string", "null"] }
        avatarUrl: { type: ["string", "null"] }
        bio: { type: ["string", "null"] }
        role: { type: string }
        xp: { type: integer }
        badges: { type: array, items: { type: string } }
        marketFocus: { type: ["string", "null"] }
        skillLevel: { type: ["string", "null"] }
        createdAt: { type: string }

    UserProfileUpdate:
      type: object
      properties:
        displayName: { type: string }
        bio: { type: string }
        marketFocus: { type: string }
        skillLevel: { type: string }

    Course:
      type: object
      required: [id, title, instructorId, category, level, status]
      properties:
        id: { type: integer }
        title: { type: string }
        description: { type: ["string", "null"] }
        instructorId: { type: string }
        instructorName: { type: ["string", "null"] }
        category: { type: string }
        level: { type: string }
        status: { type: string }
        thumbnailUrl: { type: ["string", "null"] }
        price: { type: ["number", "null"] }
        duration: { type: ["integer", "null"] }
        lessonCount: { type: integer }
        enrollmentCount: { type: integer }
        rating: { type: ["number", "null"] }
        reviewCount: { type: integer }
        isFeatured: { type: boolean }
        createdAt: { type: string }

    CourseInput:
      type: object
      required: [title, category, level]
      properties:
        title: { type: string, minLength: 1 }
        description: { type: string }
        category: { type: string }
        level: { type: string }
        thumbnailUrl: { type: string }
        price: { type: number }
        duration: { type: integer }

    CourseUpdate:
      type: object
      properties:
        title: { type: string }
        description: { type: string }
        category: { type: string }
        level: { type: string }
        status: { type: string }
        thumbnailUrl: { type: string }
        price: { type: number }
        isFeatured: { type: boolean }

    CourseSection:
      type: object
      required: [id, courseId, title, position]
      properties:
        id: { type: integer }
        courseId: { type: integer }
        title: { type: string }
        description: { type: ["string", "null"] }
        position: { type: integer }
        createdAt: { type: string }

    CourseSectionInput:
      type: object
      required: [title]
      properties:
        title: { type: string, minLength: 1 }
        description: { type: string }
        position: { type: integer }

    CourseSectionUpdate:
      type: object
      properties:
        title: { type: string }
        description: { type: string }
        position: { type: integer }

    SectionReorderInput:
      type: object
      required: [positions]
      properties:
        positions:
          type: array
          items:
            type: object
            required: [id, position]
            properties:
              id: { type: integer }
              position: { type: integer }

    LessonReorderInput:
      type: object
      required: [updates]
      properties:
        updates:
          type: array
          items:
            $ref: "#/components/schemas/LessonReorderItem"

    LessonReorderItem:
      type: object
      required: [id, order]
      properties:
        id: { type: integer }
        order: { type: integer }
        sectionId: { type: ["integer", "null"] }

    Lesson:
      type: object
      required: [id, courseId, title, type, order]
      properties:
        id: { type: integer }
        courseId: { type: integer }
        sectionId: { type: ["integer", "null"] }
        title: { type: string }
        description: { type: ["string", "null"] }
        type: { type: string }
        videoUrl: { type: ["string", "null"] }
        content: { type: ["string", "null"] }
        duration: { type: ["integer", "null"] }
        order: { type: integer }
        isFree: { type: boolean }
        dripDays: { type: integer }
        locked: { type: boolean }
        createdAt: { type: string }

    LessonInput:
      type: object
      required: [title, type, order]
      properties:
        title: { type: string, minLength: 1 }
        description: { type: string }
        type: { type: string }
        videoUrl: { type: string }
        content: { type: string }
        duration: { type: integer }
        order: { type: integer }
        isFree: { type: boolean }
        dripDays: { type: integer }
        sectionId: { type: integer }

    LessonUpdate:
      type: object
      properties:
        title: { type: string }
        description: { type: string }
        type: { type: string }
        videoUrl: { type: string }
        content: { type: string }
        duration: { type: integer }
        order: { type: integer }
        isFree: { type: boolean }
        dripDays: { type: integer }
        sectionId: { type: ["integer", "null"] }

    LessonProgressUpdate:
      type: object
      required: [completed]
      properties:
        completed: { type: boolean }
        watchedSeconds: { type: integer }

    LessonProgress:
      type: object
      required: [lessonId, userId, completed]
      properties:
        lessonId: { type: integer }
        userId: { type: string }
        completed: { type: boolean }
        watchedSeconds: { type: ["integer", "null"] }
        updatedAt: { type: string }
        xpAwarded: { type: integer }
        courseCompleted: { type: boolean }
        certificateSerial: { type: ["string", "null"] }

    Enrollment:
      type: object
      required: [id, courseId, userId, status]
      properties:
        id: { type: integer }
        courseId: { type: integer }
        userId: { type: string }
        status: { type: string }
        progress: { type: integer }
        completedLessons: { type: integer }
        totalLessons: { type: integer }
        enrolledAt: { type: string }
        completedAt: { type: ["string", "null"] }
        course: { $ref: "#/components/schemas/Course" }

    EnrollmentInput:
      type: object
      required: [courseId]
      properties:
        courseId: { type: integer }

    LiveClass:
      type: object
      required: [id, title, instructorId, scheduledAt, status]
      properties:
        id: { type: integer }
        title: { type: string }
        description: { type: ["string", "null"] }
        instructorId: { type: string }
        instructorName: { type: ["string", "null"] }
        scheduledAt: { type: string }
        duration: { type: ["integer", "null"] }
        status: { type: string }
        meetingUrl: { type: ["string", "null"] }
        replayUrl: { type: ["string", "null"] }
        category: { type: ["string", "null"] }
        maxAttendees: { type: ["integer", "null"] }
        registrationCount: { type: integer }
        thumbnailUrl: { type: ["string", "null"] }
        createdAt: { type: string }

    LiveClassInput:
      type: object
      required: [title, scheduledAt]
      properties:
        title: { type: string, minLength: 1 }
        description: { type: string }
        scheduledAt: { type: string }
        duration: { type: integer }
        meetingUrl: { type: string }
        category: { type: string }
        maxAttendees: { type: integer }
        thumbnailUrl: { type: string }

    LiveClassUpdate:
      type: object
      properties:
        title: { type: string }
        description: { type: string }
        scheduledAt: { type: string }
        duration: { type: integer }
        status: { type: string }
        meetingUrl: { type: string }
        replayUrl: { type: string }
        category: { type: string }
        maxAttendees: { type: integer }

    LiveClassRegistration:
      type: object
      required: [classId, userId]
      properties:
        classId: { type: integer }
        userId: { type: string }
        registeredAt: { type: string }

    Attendance:
      type: object
      required: [id, classId, userId, status]
      properties:
        id: { type: integer }
        classId: { type: integer }
        userId: { type: string }
        userName: { type: ["string", "null"] }
        status: { type: string }
        joinedAt: { type: ["string", "null"] }
        leftAt: { type: ["string", "null"] }
        durationMinutes: { type: ["integer", "null"] }
        createdAt: { type: string }

    AttendanceInput:
      type: object
      required: [classId, userId, status]
      properties:
        classId: { type: integer }
        userId: { type: string }
        status: { type: string }
        joinedAt: { type: string }
        leftAt: { type: string }
        durationMinutes: { type: integer }

    Post:
      type: object
      required: [id, authorId, title, category]
      properties:
        id: { type: integer }
        authorId: { type: string }
        authorName: { type: ["string", "null"] }
        authorAvatar: { type: ["string", "null"] }
        title: { type: string }
        content: { type: ["string", "null"] }
        category: { type: string }
        imageUrl: { type: ["string", "null"] }
        likes: { type: integer }
        commentCount: { type: integer }
        isPinned: { type: boolean }
        createdAt: { type: string }

    PostInput:
      type: object
      required: [title, category]
      properties:
        title: { type: string, minLength: 1 }
        content: { type: string }
        category: { type: string }
        imageUrl: { type: string }

    PostUpdate:
      type: object
      properties:
        title: { type: string }
        content: { type: string }
        category: { type: string }
        imageUrl: { type: string }
        isPinned: { type: boolean }

    Comment:
      type: object
      required: [id, postId, authorId, content]
      properties:
        id: { type: integer }
        postId: { type: integer }
        authorId: { type: string }
        authorName: { type: ["string", "null"] }
        authorAvatar: { type: ["string", "null"] }
        content: { type: string }
        likes: { type: integer }
        createdAt: { type: string }

    CommentInput:
      type: object
      required: [content]
      properties:
        content: { type: string, minLength: 1 }

    Trader:
      type: object
      required: [id, userId, displayName, roi, winRate, status]
      properties:
        id: { type: integer }
        userId: { type: string }
        displayName: { type: string }
        avatarUrl: { type: ["string", "null"] }
        bio: { type: ["string", "null"] }
        roi: { type: number }
        winRate: { type: number }
        maxDrawdown: { type: number }
        totalTrades: { type: integer }
        followers: { type: integer }
        status: { type: string }
        verified: { type: boolean }
        markets: { type: array, items: { type: string } }
        strategy: { type: ["string", "null"] }
        monthlyReturn: { type: ["number", "null"] }
        riskScore: { type: ["integer", "null"] }
        createdAt: { type: string }

    CopySubscription:
      type: object
      required: [id, userId, traderId, status]
      properties:
        id: { type: integer }
        userId: { type: string }
        traderId: { type: integer }
        traderName: { type: ["string", "null"] }
        status: { type: string }
        maxAmount: { type: ["number", "null"] }
        stopLoss: { type: ["number", "null"] }
        allocatedAmount: { type: ["number", "null"] }
        currentPnl: { type: ["number", "null"] }
        createdAt: { type: string }

    CopySubscriptionInput:
      type: object
      required: [traderId]
      properties:
        traderId: { type: integer }
        maxAmount: { type: number }
        stopLoss: { type: number }
        allocatedAmount: { type: number }

    CopySubscriptionUpdate:
      type: object
      properties:
        status: { type: string }
        maxAmount: { type: number }
        stopLoss: { type: number }
        allocatedAmount: { type: number }

    WatchlistItem:
      type: object
      required: [id, userId, symbol, market]
      properties:
        id: { type: integer }
        userId: { type: string }
        symbol: { type: string }
        market: { type: string }
        displayName: { type: ["string", "null"] }
        alertPrice: { type: ["number", "null"] }
        createdAt: { type: string }

    WatchlistInput:
      type: object
      required: [symbol, market]
      properties:
        symbol: { type: string, minLength: 1 }
        market: { type: string }
        displayName: { type: string }
        alertPrice: { type: number }

    DashboardSummary:
      type: object
      required: [enrolledCourses, completedCourses, totalXp, upcomingClasses, copySubscriptions, watchlistCount]
      properties:
        enrolledCourses: { type: integer }
        completedCourses: { type: integer }
        totalXp: { type: integer }
        upcomingClasses: { type: integer }
        copySubscriptions: { type: integer }
        watchlistCount: { type: integer }
        totalPnl: { type: ["number", "null"] }
        learningStreak: { type: integer }

    LeaderboardEntry:
      type: object
      required: [rank, userId, displayName, xp, completedCourses]
      properties:
        rank: { type: integer }
        userId: { type: string }
        displayName: { type: string }
        avatarUrl: { type: ["string", "null"] }
        xp: { type: integer }
        completedCourses: { type: integer }
        badges: { type: array, items: { type: string } }

    ActivityItem:
      type: object
      required: [id, type, description, createdAt]
      properties:
        id: { type: integer }
        type: { type: string }
        userId: { type: ["string", "null"] }
        userName: { type: ["string", "null"] }
        description: { type: string }
        metadata: { type: ["string", "null"] }
        createdAt: { type: string }

    AdminStats:
      type: object
      required: [totalUsers, totalCourses, totalEnrollments, activeUsers, revenue]
      properties:
        totalUsers: { type: integer }
        totalCourses: { type: integer }
        totalEnrollments: { type: integer }
        activeUsers: { type: integer }
        revenue: { type: number }
        newUsersToday: { type: integer }
        pendingInstructors: { type: integer }
        upcomingClasses: { type: integer }

    # ── LMS: PROGRESS ──────────────────────────────────────────────
    CourseProgress:
      type: object
      required: [courseId, totalLessons, completedLessons, percent, courseCompleted]
      properties:
        courseId: { type: integer }
        totalLessons: { type: integer }
        completedLessons: { type: integer }
        percent: { type: integer }
        courseCompleted: { type: boolean }
        completedAt: { type: ["string", "null"] }
        certificateSerial: { type: ["string", "null"] }
        lessons:
          type: array
          items: { $ref: "#/components/schemas/LessonProgress" }
        unlockedLessonIds:
          type: array
          items: { type: integer }

    # ── LMS: QUIZZES ───────────────────────────────────────────────
    QuizQuestion:
      type: object
      required: [id, question, options, order]
      properties:
        id: { type: integer }
        question: { type: string }
        options: { type: array, items: { type: string } }
        order: { type: integer }

    Quiz:
      type: object
      required: [id, courseId, title, passingScore, xpReward]
      properties:
        id: { type: integer }
        courseId: { type: integer }
        lessonId: { type: ["integer", "null"] }
        title: { type: string }
        description: { type: ["string", "null"] }
        passingScore: { type: integer }
        xpReward: { type: integer }
        order: { type: integer }
        questionCount: { type: integer }
        bestScore: { type: ["integer", "null"] }
        passed: { type: boolean }
        questions:
          type: array
          items: { $ref: "#/components/schemas/QuizQuestion" }

    QuizQuestionInput:
      type: object
      required: [question, options, correctIndex]
      properties:
        question: { type: string, minLength: 1 }
        options: { type: array, items: { type: string } }
        correctIndex: { type: integer }
        explanation: { type: string }
        order: { type: integer }

    QuizInput:
      type: object
      required: [title, questions]
      properties:
        lessonId: { type: integer }
        title: { type: string, minLength: 1 }
        description: { type: string }
        passingScore: { type: integer }
        xpReward: { type: integer }
        order: { type: integer }
        questions:
          type: array
          items: { $ref: "#/components/schemas/QuizQuestionInput" }

    QuizAttemptInput:
      type: object
      required: [answers]
      properties:
        answers: { type: array, items: { type: integer } }

    QuizQuestionResult:
      type: object
      required: [questionId, correct, correctIndex]
      properties:
        questionId: { type: integer }
        correct: { type: boolean }
        correctIndex: { type: integer }
        explanation: { type: ["string", "null"] }

    QuizAttemptResult:
      type: object
      required: [score, passed, correctCount, total, xpAwarded]
      properties:
        score: { type: integer }
        passed: { type: boolean }
        correctCount: { type: integer }
        total: { type: integer }
        xpAwarded: { type: integer }
        gateStatus: { type: string }
        results:
          type: array
          items: { $ref: "#/components/schemas/QuizQuestionResult" }

    QuizAttempt:
      type: object
      required: [id, quizId, userId, score, passed, createdAt]
      properties:
        id: { type: integer }
        quizId: { type: integer }
        userId: { type: string }
        score: { type: integer }
        passed: { type: boolean }
        createdAt: { type: string }

    # ── LMS: TASKS ─────────────────────────────────────────────────
    Task:
      type: object
      required: [id, courseId, title, xpReward, order]
      properties:
        id: { type: integer }
        courseId: { type: integer }
        title: { type: string }
        description: { type: ["string", "null"] }
        xpReward: { type: integer }
        order: { type: integer }
        completed: { type: boolean }
        submission: { type: ["string", "null"] }

    TaskInput:
      type: object
      required: [title]
      properties:
        title: { type: string, minLength: 1 }
        description: { type: string }
        xpReward: { type: integer }
        order: { type: integer }

    TaskCompleteInput:
      type: object
      properties:
        submission: { type: string }

    TaskCompletion:
      type: object
      required: [taskId, userId, completedAt]
      properties:
        taskId: { type: integer }
        userId: { type: string }
        submission: { type: ["string", "null"] }
        completedAt: { type: string }
        xpAwarded: { type: integer }

    # ── LMS: CERTIFICATES ──────────────────────────────────────────
    Certificate:
      type: object
      required: [serial, courseId, userId, issuedAt]
      properties:
        serial: { type: string }
        courseId: { type: integer }
        userId: { type: string }
        issuedAt: { type: string }
        courseTitle: { type: ["string", "null"] }
        userName: { type: ["string", "null"] }
        instructorName: { type: ["string", "null"] }

    # ── LMS: REVIEWS ───────────────────────────────────────────────
    Review:
      type: object
      required: [id, courseId, userId, rating, createdAt]
      properties:
        id: { type: integer }
        courseId: { type: integer }
        userId: { type: string }
        userName: { type: ["string", "null"] }
        rating: { type: integer }
        comment: { type: ["string", "null"] }
        createdAt: { type: string }

    ReviewInput:
      type: object
      required: [rating]
      properties:
        rating: { type: integer, minimum: 1, maximum: 5 }
        comment: { type: string }

    ReviewSummary:
      type: object
      required: [average, count]
      properties:
        average: { type: number }
        count: { type: integer }
        distribution:
          type: array
          items: { type: integer }
        myReview: { $ref: "#/components/schemas/Review" }
        reviews:
          type: array
          items: { $ref: "#/components/schemas/Review" }

    # ── LMS: NOTES & BOOKMARKS ─────────────────────────────────────
    Note:
      type: object
      required: [id, lessonId, courseId, userId, content, createdAt]
      properties:
        id: { type: integer }
        lessonId: { type: integer }
        courseId: { type: integer }
        userId: { type: string }
        content: { type: string }
        timestampSeconds: { type: ["integer", "null"] }
        createdAt: { type: string }

    NoteInput:
      type: object
      required: [content]
      properties:
        content: { type: string, minLength: 1 }
        timestampSeconds: { type: integer }

    NoteUpdate:
      type: object
      required: [content]
      properties:
        content: { type: string, minLength: 1 }

    Bookmark:
      type: object
      required: [lessonId, courseId, userId]
      properties:
        id: { type: integer }
        lessonId: { type: integer }
        courseId: { type: integer }
        userId: { type: string }
        createdAt: { type: string }
        lessonTitle: { type: ["string", "null"] }

    BookmarkToggleResult:
      type: object
      required: [lessonId, bookmarked]
      properties:
        lessonId: { type: integer }
        bookmarked: { type: boolean }

    # ── LMS: PREREQUISITES ─────────────────────────────────────────
    PrerequisiteCourse:
      type: object
      required: [courseId, requiredCourseId, title, met]
      properties:
        courseId: { type: integer }
        requiredCourseId: { type: integer }
        title: { type: string }
        met: { type: boolean }

    # ── LMS: INSTRUCTOR ANALYTICS ──────────────────────────────────
    LessonDropoff:
      type: object
      required: [lessonId, title, completions]
      properties:
        lessonId: { type: integer }
        title: { type: string }
        completions: { type: integer }
        completionRate: { type: number }

    QuizStat:
      type: object
      required: [quizId, title, attempts, passRate]
      properties:
        quizId: { type: integer }
        title: { type: string }
        attempts: { type: integer }
        passRate: { type: number }
        averageScore: { type: number }

    CourseAnalytics:
      type: object
      required: [courseId, enrollments, completions, completionRate]
      properties:
        courseId: { type: integer }
        enrollments: { type: integer }
        completions: { type: integer }
        completionRate: { type: number }
        averageRating: { type: ["number", "null"] }
        reviewCount: { type: integer }
        revenue: { type: number }
        lessonDropoff:
          type: array
          items: { $ref: "#/components/schemas/LessonDropoff" }
        quizStats:
          type: array
          items: { $ref: "#/components/schemas/QuizStat" }

    # ── LMS: LESSON GATES ──────────────────────────────────────────
    LessonGateAnalytics:
      type: object
      required: [lessonId, courseId, total, pending, approved, rejected, passRate]
      properties:
        lessonId: { type: integer }
        lessonTitle: { type: ["string", "null"] }
        courseId: { type: integer }
        courseTitle: { type: ["string", "null"] }
        quizTitle: { type: ["string", "null"] }
        total: { type: integer }
        pending: { type: integer }
        approved: { type: integer }
        rejected: { type: integer }
        passRate: { type: number }
        averageScore: { type: ["number", "null"] }

    LessonGate:
      type: object
      required: [id, userId, courseId, lessonId, requiredQuizId, status, createdAt, updatedAt]
      properties:
        id: { type: integer }
        userId: { type: string }
        courseId: { type: integer }
        lessonId: { type: integer }
        requiredQuizId: { type: integer }
        status: { type: string }
        score: { type: ["integer", "null"] }
        reviewNote: { type: ["string", "null"] }
        reviewedBy: { type: ["string", "null"] }
        reviewedAt: { type: ["string", "null"] }
        submittedAt: { type: ["string", "null"] }
        createdAt: { type: string }
        updatedAt: { type: string }

    GateReviewItem:
      type: object
      required: [id, userId, courseId, lessonId, requiredQuizId, status, createdAt, updatedAt]
      properties:
        id: { type: integer }
        userId: { type: string }
        userName: { type: ["string", "null"] }
        userAvatar: { type: ["string", "null"] }
        courseId: { type: integer }
        courseTitle: { type: ["string", "null"] }
        lessonId: { type: integer }
        lessonTitle: { type: ["string", "null"] }
        requiredQuizId: { type: integer }
        quizTitle: { type: ["string", "null"] }
        status: { type: string }
        score: { type: ["integer", "null"] }
        reviewNote: { type: ["string", "null"] }
        submittedAt: { type: ["string", "null"] }
        createdAt: { type: string }
        updatedAt: { type: string }

    GateRejectInput:
      type: object
      required: [reviewNote, newQuiz]
      properties:
        reviewNote: { type: string, minLength: 1 }
        newQuiz:
          type: object
          required: [title, questions]
          properties:
            title: { type: string, minLength: 1 }
            description: { type: string }
            passingScore: { type: integer }
            questions:
              type: array
              items: { $ref: "#/components/schemas/QuizQuestionInput" }

    ReviewCount:
      type: object
      required: [pending]
      properties:
        pending: { type: integer }
